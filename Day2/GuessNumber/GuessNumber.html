<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="styles.css" />
    <title>Guess My Number!</title>
  </head>
  <body>
    <header>
      <div class="modal-overlay hidden"></div>
      <h1 class="game-title">Guess My Number!</h1>
      <p class="range-hint">( Between 1 and 20 )</p>
      <button class="btn-reset">Again!</button>
      <div class="secret-number">?</div>
    </header>
    <main>
      <section class="input-panel">
        <input type="number" class="input-guess" />
        <button class="btn-submit">Check!</button>
      </section>

      <section class="score-panel">
        <p class="status-message">Start guessing...</p>
        <p class="score-label">Score: <span class="score-value">20</span></p>
        <p class="highscore-label">
          Highscore: <span class="highscore-value">0</span>
        </p>
      </section>
    </main>
    <script src="index.js"></script>
  </body>
</html>
